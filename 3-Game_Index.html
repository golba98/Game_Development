<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Game</title>
    <meta name="description" content="Fullscreen game iframe (no UI chrome)." />
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        background: #000;
        overflow: hidden;
      }

      #game-root {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        -webkit-tap-highlight-color: transparent;
      }

      #game-root canvas {
        width: 100% !important;
        height: 100% !important;
        display: block;
        object-fit: contain;
        background: #000;
      }

      ::-webkit-scrollbar {
        display: none;
      }
      html {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      @font-face { 
        font-family: 'PixelGameFont'; 
        src: url('assets/3-GUI/font.ttf'); 
        font-display: swap;
      }
      #gd-loading-overlay {
        font-family: 'PixelGameFont', 'Courier New', monospace !important;
        background-color: #000000 !important;
        color: #ffcc00;
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        z-index: 2147483647; user-select: none; opacity: 1;
      }
      .gd-loading-message {
        font-size: 40px; text-transform: uppercase; margin-bottom: 16px;
        text-shadow: 2px 2px 0px #111; letter-spacing: 2px;
      }
      .gd-progress-container {
        width: 220px; max-width: 60%; height: 16px; border: 1px solid #ffcc00;
        background-color: #111; padding: 1px; margin-bottom: 4px;
      }
      .gd-progress-fill {
        height: 100%; width: 0%; background-color: #ffcc00; transition: width 0.1s linear;
      }
      .gd-progress-text { font-size: 14px; color: #888; }
      #gd-loading-content {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        transform-origin: center center; transition: transform 0.1s ease-out;
      }
    </style>
  </head>
  <body>
    <div id="gd-loading-overlay">
      <div id="gd-loading-content">
        <div class="gd-loading-message">LOADING MAP...</div>
        <div class="gd-progress-container">
          <div class="gd-progress-fill"></div>
        </div>
        <div class="gd-progress-text">0%</div>
      </div>
    </div>
    <div id="game-root" aria-live="polite" aria-busy="true"></div>

    <script defer src="https://cdn.jsdelivr.net/npm/p5@1.6.0/lib/p5.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/p5@1.6.0/lib/addons/p5.sound.min.js"></script>

    <script defer src="src/shared/shared-constants.js"></script>
    <script defer src="src/game/game-globals.js"></script>
    <script defer src="src/game/game-assets.js"></script>
    <script defer src="src/game/game-map.js"></script>
    <script defer src="src/game/game-enemies.js"></script>
    <script defer src="src/game/game-movement.js"></script>
    <script defer src="src/game/game-hud.js"></script>
    <script defer src="src/game/game-ui.js"></script>
    <script defer src="src/game/game-ui-rpg.js"></script>
    <script defer src="src/game/game-settings.js"></script>
    <script defer src="src/game/game-io.js"></script>
    <script defer src="src/game/game-terminal.js"></script>
    <script defer src="src/game/game-tutorial.js"></script>
    <script defer src="src/game/game-input.js"></script>
    <script defer src="src/game/game-world.js"></script>
    <script defer src="src/game/game-utils.js"></script>
    <script defer src="src/game/game-weather.js"></script>
    <script defer src="src/game/game-core.js"></script>

    <script>
      (function () {
        const root = document.getElementById("game-root");

        function adoptCanvas() {
          const canvas = document.querySelector("canvas");
          if (!canvas) return false;
          if (canvas.parentElement !== root) {
            root.appendChild(canvas);
          }

          canvas.style.width = "100%";
          canvas.style.height = "100%";
          canvas.style.objectFit = "contain";
          canvas.style.display = "block";
          canvas.setAttribute("tabindex", "0");
          root.setAttribute("aria-busy", "false");
          try {
            canvas.focus();
          } catch (e) {}
          try {
            window.focus();
          } catch (e) {}
          return true;
        }

        if (adoptCanvas()) return;
        let tries = 0;
        const poll = setInterval(() => {
          tries++;
          if (adoptCanvas() || tries > 50) {
            clearInterval(poll);
            if (tries > 50) {
              console.warn(
                "game.html: no canvas found after polling — check game.js for errors.",
              );
            }
          }
        }, 100);

        window.addEventListener(
          "message",
          (ev) => {
            if (!ev || !ev.data) return;
            if (ev.data && ev.data.type === "close-game-overlay") {
              try {
                if (window.parent && window.parent !== window) {
                  if (window.parent.removeGameOverlay) {
                    window.parent.removeGameOverlay();
                  }
                }
              } catch (e) {}
            }
          },
          false,
        );

        try {
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: "game-iframe-ready" }, "*");
          }
        } catch (e) {}
      })();
    </script>
  </body>
</html>
