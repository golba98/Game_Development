<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern Game Menu</title>

    <script src="https://cdn.jsdelivr.net/npm/p5@1.6.0/lib/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.6.0/lib/addons/p5.sound.min.js"></script>


    <script src="src/shared/shared-constants.js"></script>
    <script src="src/menu/menu-globals.js"></script>
    <script src="src/menu/menu-audio.js"></script>
    <script src="src/menu/menu-io.js"></script>
    <script src="src/menu/menu-video.js"></script>
    <script src="src/menu/menu-zoom.js"></script>
    <script src="src/menu/menu-ui.js"></script>
    <script src="src/menu/menu-terminal.js"></script>
    <script src="src/menu/menu-settings.js"></script>
    <script src="src/menu/menu-core.js"></script>


    <style>
      
      html,
      body {
        margin: 0;
        padding: 0;
        overflow: hidden; 
        height: 100%;
        background-color: #000; 
      }

      
      canvas {
        display: block;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 0; 
      }

      /* Only target top-level p5 elements to avoid breaking complex UI like the terminal */
      body > button,
      body > div,
      body > input,
      body > select {
        position: absolute; 
        z-index: 10; 
      }
    </style>
  </head>
